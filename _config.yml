# ============================================================
# STEP 1: Your Identity (required)
# ============================================================
name: "Ayush Urs"
title: "MSCS Student"
institution: "UC San Diego"
email: aurs@ucsd.edu
photo: prof_pic.jpg  # place your photo in images/

# ============================================================
# STEP 2: Your Links (optional -- delete any you don't use)
# ============================================================
links:
  google_scholar: ""
  github: "https://github.com/ayush11z"
  researchgate: ""
  orcid: ""
  twitter: ""
  linkedin: "https://www.linkedin.com/in/ayush-urs-515a42205/"
  cv: "papers/Ayush_Urs_Resume.pdf"  # place your CV in the papers/ directory

# ============================================================
# STEP 3: Site Settings
# ============================================================
accent_color: "#1a7a6d"      # theme color for links and buttons
dark_mode: true              # show dark mode toggle in navbar
description: "MSCS student at UC San Diego working on agentic AI systems and applied ML for health."
baseurl: ""
url: "https://ayush11z.github.io"

# Google Analytics — paste your GA4 measurement ID, or leave blank
analytics:
  google_id: ""

# ============================================================
# STEP 4: Choose Your Pages (comment out any you don't need)
# ============================================================
nav_pages:
  - name: projects
  - name: publications
  - name: cv

# ============================================================
# Advanced Settings (you probably don't need to change these)
# ============================================================
include:
  - .htaccess
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:path/

sass:
  quiet_deps: true
  style: compressed

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

plugins: ["jekyll/scholar", "jekyll-sitemap"]

scholar:
  last_name: Urs
  first_name: [Ayush, A.]
  style: citesty
  locale: en
  source: /assets/
  bibliography: ref.bib
  bibliography_template: bibtemplate
  sort_by: year, month
  order: descending
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  bibliography_list_attributes:
    reversed: "reversed"

exclude:
  - Gemfile
  - Gemfile.lock
  - update_bootstrap.sh
  - switch_theme.sh
  - tags
  - Rakefile
  - node_modules
  - package.json
  - package-lock.json
  - docs
  - README.md
  - LICENSE
  - UPGRADING.md
  - setup.sh
  - vendor
